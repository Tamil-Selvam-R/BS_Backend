server.port=8081
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# CORS is configured in com.buildsmart.gateway.config.CorsConfig (CorsWebFilter bean).

# ─── IAM ────────────────────────────────────────────
spring.cloud.gateway.routes[0].id=iam-auth
spring.cloud.gateway.routes[0].uri=lb://iam-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=iam-users
spring.cloud.gateway.routes[1].uri=lb://iam-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[2].id=iam-admin
spring.cloud.gateway.routes[2].uri=lb://iam-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/**

