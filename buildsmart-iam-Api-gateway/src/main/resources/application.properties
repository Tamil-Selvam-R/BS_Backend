spring.cloud.gateway.routes[23].predicates[0]=Path=/api/notifications/**

# ─── Finance — synchronous budget approval check (FEATURE SET 1) ─────────
# Singular /api/budget/approve is the contract used by the Resource Allocation
# service's Feign client. Distinct from /api/budgets/** (route 10 — plural).
spring.cloud.gateway.routes[24].id=finance-budget-approve
spring.cloud.gateway.routes[24].uri=lb://finance-service
spring.cloud.gateway.routes[24].predicates[0]=Path=/api/budget/**

# ─── Vendor — derived vendor list (consumed by analytics) ────────────────
# Plural /api/vendors/** sits next to the existing singular /api/vendor/**
# route and is served by the new VendorController in vendor-service.
spring.cloud.gateway.routes[25].id=vendor-vendors
spring.cloud.gateway.routes[25].uri=lb://vendor-service
spring.cloud.gateway.routes[25].predicates[0]=Path=/api/vendors/**

# Logging / actuator
logging.level.org.springframework.cloud.gateway=INFO
management.endpoints.web.exposure.include=health,gateway
