spring.application.name=siteops-service
server.port=8087

# Swagger / OpenAPI configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.persistAuthorization=true
springdoc.packages-to-scan=com.buildsmart.siteops

# Exclude default Spring Security auto-config (we use JWT)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/bs_siteops?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# IAM Service is resolved via Eureka (service name: iam-service) ? no hardcoded URL needed


# JWT - must match the IAM service jwt.secret exactly
app.jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}

# Primary module name for this service
app.module.name=siteops

# Accepted module claims in JWT (missing module claim is allowed for IAM-issued generic tokens)
app.jwt.accepted-modules=siteops,iam

# Deleted-user protection:
# After IAM confirms a user is ACTIVE, cache that result for this many minutes.
# During this window, IAM is not re-called on every request.
# Lower value = tighter security; higher value = less IAM traffic.
# When a user is deleted in IAM, they can access siteops for at most this many minutes.
app.security.user-validation-cache-minutes=5

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Feign ? service discovery via Eureka (no hardcoded URLs needed)
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=10000

# Resilience4j ? enable circuit breaker for Feign clients
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit breaker config for IAM service
resilience4j.circuitbreaker.instances.iam-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.iam-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.iam-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.iam-service.permitted-number-of-calls-in-half-open-state=2

# Circuit breaker config for Project Manager service
resilience4j.circuitbreaker.instances.project-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.project-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.project-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.project-service.permitted-number-of-calls-in-half-open-state=2
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
# File upload - photo attachments for site logs
logging.level.root=WARN
logging.level.com.buildsmart=INFO
logging.level.org.springframework.web=INFO
logging.file.name=logs/siteops-service.log


