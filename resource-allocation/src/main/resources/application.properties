spring.application.name=resource-allocation

server.port=9091

spring.datasource.url=jdbc:mysql://localhost:3306/bs_resource?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

iam.service.url=${IAM_SERVICE_URL:http://localhost:8082}
finance.service.url=${FINANCE_SERVICE_URL:http://localhost:8090}
project.service.url=${PROJECT_SERVICE_URL:http://localhost:8086}
siteops.service.url=${SITEOPS_SERVICE_URL:http://localhost:8087}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8085}

app.jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}

app.security.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}

spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.configurations=default
spring.cloud.openfeign.circuitbreaker.enabled=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.file.name=logs/resource-allocation.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

resilience4j.circuitbreaker.instances.financeService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.financeService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.financeService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.financeService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.financeService.permittedNumberOfCallsInHalfOpenState=2

resilience4j.circuitbreaker.instances.projectService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.projectService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.projectService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.projectService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.projectService.permittedNumberOfCallsInHalfOpenState=2

resilience4j.circuitbreaker.instances.iamService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.iamService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.iamService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.iamService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.iamService.permittedNumberOfCallsInHalfOpenState=2
