spring.datasource.url=jdbc:mysql://localhost:3306/bs_report?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
server.error.include-message=always
server.error.include-binding-errors=always
server.port=8084

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
spring.application.name=report-analytics-service

# IAM Service direct URL (used when Eureka is unavailable)
iam.service.url=http://localhost:8082
iam.username=root
iam.password=root

# Project Manager Service direct URL
project.service.url=http://localhost:8086

# Safety Service direct URL
safety.service.url=http://localhost:8083

# Resource Allocation Service direct URL
resource.service.url=http://localhost:9091

# Site Engineer Service direct URL
site.engineer.service.url=http://localhost:8087

# Vendor Service direct URL
vendor.service.url=http://localhost:8088

# Finance Service direct URL
finance.service.url=http://localhost:8090

# Feign Circuit Breaker - enabled for fallback support
spring.cloud.openfeign.circuitbreaker.enabled=true

# Shared defaults
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.slow-call-rate-threshold=80
resilience4j.circuitbreaker.configs.default.slow-call-duration-threshold=3s
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.record-exceptions=java.lang.Exception

# Project Service
resilience4j.circuitbreaker.instances.ProjectServiceClient.base-config=default
resilience4j.circuitbreaker.instances.ProjectServiceClient.wait-duration-in-open-state=20s

# Safety Service
resilience4j.circuitbreaker.instances.SafetyServiceClient.base-config=default
resilience4j.circuitbreaker.instances.SafetyServiceClient.wait-duration-in-open-state=20s

# Finance Service
resilience4j.circuitbreaker.instances.FinanceServiceClient.base-config=default
resilience4j.circuitbreaker.instances.FinanceServiceClient.wait-duration-in-open-state=20s

# Resource Service
resilience4j.circuitbreaker.instances.ResourceServiceClient.base-config=default
resilience4j.circuitbreaker.instances.ResourceServiceClient.wait-duration-in-open-state=20s

# Vendor Service
resilience4j.circuitbreaker.instances.VendorServiceClient.base-config=default
resilience4j.circuitbreaker.instances.VendorServiceClient.wait-duration-in-open-state=20s

# Site Engineer Service
resilience4j.circuitbreaker.instances.SiteEngineerServiceClient.base-config=default
resilience4j.circuitbreaker.instances.SiteEngineerServiceClient.wait-duration-in-open-state=20s

# IAM Service
resilience4j.circuitbreaker.instances.IamServiceClient.base-config=default
resilience4j.circuitbreaker.instances.IamServiceClient.wait-duration-in-open-state=20s

# ??? Resilience4j Retry ???????????????????????????????????????????????????????
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=1s
resilience4j.retry.configs.default.enable-exponential-backoff=true
resilience4j.retry.configs.default.exponential-backoff-multiplier=2
resilience4j.retry.configs.default.retry-exceptions=java.io.IOException,java.util.concurrent.TimeoutException

resilience4j.retry.instances.ProjectServiceClient.base-config=default
resilience4j.retry.instances.SafetyServiceClient.base-config=default
resilience4j.retry.instances.FinanceServiceClient.base-config=default
resilience4j.retry.instances.ResourceServiceClient.base-config=default
resilience4j.retry.instances.VendorServiceClient.base-config=default
resilience4j.retry.instances.SiteEngineerServiceClient.base-config=default
resilience4j.retry.instances.IamServiceClient.base-config=default

# ??? Resilience4j TimeLimiter ?????????????????????????????????????????????????
resilience4j.timelimiter.configs.default.timeout-duration=5s
resilience4j.timelimiter.configs.default.cancel-running-future=true

resilience4j.timelimiter.instances.ProjectServiceClient.base-config=default
resilience4j.timelimiter.instances.SafetyServiceClient.base-config=default
resilience4j.timelimiter.instances.FinanceServiceClient.base-config=default
resilience4j.timelimiter.instances.ResourceServiceClient.base-config=default
resilience4j.timelimiter.instances.VendorServiceClient.base-config=default
resilience4j.timelimiter.instances.SiteEngineerServiceClient.base-config=default
resilience4j.timelimiter.instances.IamServiceClient.base-config=default

# ??? Actuator - expose circuit breaker metrics ????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Feign logging (DEBUG level to see Feign request/response details)
logging.level.com.buildsmart.analytics.client=DEBUG
logging.level.feign=DEBUG

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000